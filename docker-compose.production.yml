# ==============================================================================
# SMC-Office - Production Docker Compose V4.8.4
# Infisical Secret Management | Isolierte Produktions-Container
# ==============================================================================

version: '3.8'

services:
  # ============================================================================
  # SMC-Office App Container
  # ============================================================================
  smc-office-prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smc-office-prod
    hostname: smc-office-prod
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_PUBLIC_URL=${S3_PUBLIC_URL}
      - NEXT_PUBLIC_S3_ENDPOINT=${NEXT_PUBLIC_S3_ENDPOINT}
      # Infisical Configuration
      - INFISICAL_TOKEN=${INFISICAL_TOKEN}
      - INFISICAL_PROJECT_ID=2e7b3ad9-645b-4a56-a472-7b080cc1a4b8
      - INFISICAL_ENVIRONMENT=production
      - INFISICAL_API_URL=http://85.215.165.187:8081
    volumes:
      - uploads:/app/uploads
      - next_cache:/app/.next/cache
    depends_on:
      smc-postgres-prod:
        condition: service_healthy
      smc-minio-init-prod:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - smc-network

  # ============================================================================
  # PostgreSQL Datenbank
  # ============================================================================
  smc-postgres-prod:
    image: postgres:15-alpine
    container_name: smc-postgres-prod
    hostname: smc-postgres-prod
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_PUBLIC_URL=${S3_PUBLIC_URL}
      - NEXT_PUBLIC_S3_ENDPOINT=${NEXT_PUBLIC_S3_ENDPOINT}
      - POSTGRES_USER=${POSTGRES_USER:-smc_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-smc_office_prod}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smc_user} -d ${POSTGRES_DB:-smc_office_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smc-network

  # ============================================================================
  # MinIO S3-Storage
  # ============================================================================
  smc-minio-prod:
    image: minio/minio:latest
    container_name: smc-minio-prod
    hostname: smc-minio-prod
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_PUBLIC_URL=${S3_PUBLIC_URL}
      - NEXT_PUBLIC_S3_ENDPOINT=${NEXT_PUBLIC_S3_ENDPOINT}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - smc-network

  # ============================================================================
  # MinIO Bucket Initialization (einmaliger Setup-Job)
  # ============================================================================
  smc-minio-init-prod:
    image: minio/mc:latest
    container_name: smc-minio-init-prod
    depends_on:
      smc-minio-prod:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc mb --ignore-existing myminio/$${S3_BUCKET_NAME:-smc-uploads};
      mc anonymous set download myminio/$${S3_BUCKET_NAME:-smc-uploads}/public;
      echo 'Bucket initialization complete';
      "
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_PUBLIC_URL=${S3_PUBLIC_URL}
      - NEXT_PUBLIC_S3_ENDPOINT=${NEXT_PUBLIC_S3_ENDPOINT}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-smc-uploads}
    networks:
      - smc-network

volumes:
  uploads:
  pg_data:
  minio_data:
  next_cache:

networks:
  smc-network:
    driver: bridge
