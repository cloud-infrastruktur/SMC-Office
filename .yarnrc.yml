# ==============================================================================
# Yarn Berry Configuration - SMC Website v4.0
# ==============================================================================
# Diese Konfiguration ist für die Entwicklungsumgebung optimiert.
# Für Docker-Deployment wird PnP im Dockerfile aktiviert.
# ==============================================================================

# Node-Modules Linker für Kompatibilität mit gehosteten Umgebungen
# Docker-Build überschreibt dies für PnP-Modus
nodeLinker: node-modules

# Globaler Cache für schnellere Builds
enableGlobalCache: true
globalFolder: /opt/hostedapp/node/yarn/global

# Hardlinks für schnellere Installation
nmMode: hardlinks-global

# Telemetry deaktivieren
enableTelemetry: false
