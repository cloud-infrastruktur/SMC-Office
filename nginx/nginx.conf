# SMC-Office Nginx Reverse Proxy
# ===============================
# Production-ready Konfiguration mit Security Headers

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/rss+xml application/atom+xml image/svg+xml;

    # Security Headers (global)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Rate Limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    # Upstream (Next.js App)
    upstream smc_app {
        server app:3000;
        keepalive 32;
    }

    # Upstream (MinIO S3)
    upstream minio_s3 {
        server minio:9000;
        keepalive 16;
    }

    # HTTP -> HTTPS Redirect
    server {
        listen 80;
        server_name smc.nrw www.smc.nrw;
        return 301 https://$server_name$request_uri;
    }

    # HTTPS Server
    server {
        listen 443 ssl http2;
        server_name smc.nrw www.smc.nrw;

        # SSL Zertifikate (Let's Encrypt oder manuell)
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # SSL Konfiguration (Modern)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_stapling on;
        ssl_stapling_verify on;

        # HSTS (vorsichtig aktivieren)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Request Size Limits
        client_max_body_size 100M;
        client_body_buffer_size 10M;

        # Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Login Rate Limiting
        location /api/auth/ {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://smc_app;
        }

        # API Rate Limiting
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://smc_app;
        }

        # MinIO S3 Proxy (für öffentliche Dateien)
        location /s3/ {
            rewrite ^/s3/(.*)$ /$1 break;
            proxy_pass http://minio_s3;
            proxy_set_header Host $http_host;
            proxy_hide_header x-amz-request-id;
            proxy_hide_header x-amz-id-2;
        }

        # Next.js Static Files
        location /_next/static/ {
            proxy_pass http://smc_app;
            proxy_cache_valid 200 365d;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Public Files
        location /public/ {
            proxy_pass http://smc_app;
            add_header Cache-Control "public, max-age=86400";
        }

        # Next.js App (Fallback)
        location / {
            proxy_pass http://smc_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;
        }
    }
}
